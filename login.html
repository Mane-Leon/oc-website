<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<main class="login-shell">
  <section class="login-card">
    <p class="login-overline">Sistema comercial</p>
    <h1>Iniciar sesion</h1>
    <p class="login-subtitle">Accede para gestionar ordenes de compra y pendientes.</p>

    <label for="email">Correo</label>
    <input id="email" type="email" placeholder="tu.correo@empresa.com" autocomplete="username">

    <label for="password">Contrasena</label>
    <input id="password" type="password" placeholder="Tu contrasena" autocomplete="current-password">

    <button id="loginBtn">Entrar</button>
    <p id="msg" aria-live="polite"></p>
  </section>
</main>

<script type="module" src="js/auth-guard.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
